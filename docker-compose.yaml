version: '3.8'
services:
  gemini-cli:
    image: gemini-cli:latest
    container_name: gemini-cli
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./workspaces:/workspaces
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    tty: true
    stdin_open: true
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
volumes:
  gemini-cli: {}
